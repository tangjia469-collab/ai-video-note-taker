<!doctype html>
<html lang="zh-CN" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <title>AI 视频笔记</title>
  <link rel="stylesheet" href="../lib/theme.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <header class="hdr">
      <div class="brand">
        <div class="brand-logo" id="brandLogo"></div>
        <div class="brand-text">
          <div class="title">AI 视频笔记</div>
          <div class="ver">v<span id="version">0.0.0</span></div>
        </div>
      </div>
      <div class="mascot" id="popupMascot"></div>
    </header>

    <section class="status-row">
      <span class="dot" id="video-dot"></span>
      <span id="video-text">检测中…</span>
    </section>

    <button id="btn-open" class="btn-primary big-action">
      <span data-icon="notebook" data-icon-size="16"></span>
      <span>打开 AI 笔记面板</span>
    </button>

    <section class="config-list">
      <div class="config-item">
        <span data-icon="sparkles" data-icon-size="14" class="cfg-ic"></span>
        <span class="label">Anthropic API</span>
        <span class="state" id="ai-state">检查中…</span>
        <span class="dot" id="ai-dot"></span>
      </div>
      <div class="config-item">
        <span data-icon="link" data-icon-size="14" class="cfg-ic"></span>
        <span class="label">Obsidian API</span>
        <span class="state" id="obs-state">检查中…</span>
        <span class="dot" id="obs-dot"></span>
      </div>
    </section>

    <footer class="ftr">
      <a href="#" id="link-options">
        <span data-icon="settings" data-icon-size="13"></span>
        <span>打开设置</span>
      </a>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
